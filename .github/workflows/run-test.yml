name: Execute Selenium UI Tests

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Run TC_Filter_ProductCategory in Headless Chrome
      env:
        BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
        BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
        JIRA_SITE_URL: ${{ secrets.JIRA_SITE_URL }}
        JIRA_USERNAME: ${{ secrets.JIRA_USERNAME }}
        JIRA_API_KEY: ${{ secrets.JIRA_API_KEY }}
        JIRA_PROJECT_KEY: ${{ secrets.JIRA_PROJECT_KEY }}
      # Sử dụng temp_run.xml vì trong đó đã setup sẵn Test Class là TC_Filter_ProductCategory, browserName là hchrome và url
      run: mvn clean test -Dsurefire.suiteXmlFiles=temp_run.xml

    - name: Generate Allure Report
      if: always()
      run: mvn allure:report

    - name: Upload Allure Report as Artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-report
        path: target/site/allure-maven-plugin
        retention-days: 7
