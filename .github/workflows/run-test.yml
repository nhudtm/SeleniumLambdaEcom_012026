name: Execute Selenium UI Tests

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Validate required test secrets
      env:
        TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
        TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
      run: |
        if [ -z "$TEST_EMAIL" ] || [ -z "$TEST_PASSWORD" ]; then
          echo "Missing required secrets: TEST_EMAIL and/or TEST_PASSWORD"
          exit 1
        fi

    - name: Run regression tests on Chrome and Firefox
      env:
        BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
        BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
        JIRA_SITE_URL: ${{ secrets.JIRA_SITE_URL }}
        JIRA_USERNAME: ${{ secrets.JIRA_USERNAME }}
        JIRA_API_KEY: ${{ secrets.JIRA_API_KEY }}
        JIRA_PROJECT_KEY: ${{ secrets.JIRA_PROJECT_KEY }}
        DEV_URL: ${{ secrets.DEV_URL }}
        TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
        TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
      run: mvn clean test -Dsurefire.suiteXmlFiles=src/test/resources/runOnPROD.xml -Dtest.email="${{ secrets.TEST_EMAIL }}" -Dtest.password="${{ secrets.TEST_PASSWORD }}"

    - name: Generate Allure Report
      if: always()
      run: mvn allure:report

    - name: Generate pass/fail count badges
      if: always()
      run: |
        python3 - <<'PY'
        import glob
        import json
        import os
        import xml.etree.ElementTree as ET

        report_dir = "target/surefire-reports"
        xml_files = glob.glob(os.path.join(report_dir, "TEST-*.xml"))

        total = failures = errors = skipped = 0

        for path in xml_files:
            try:
                root = ET.parse(path).getroot()
                tests = int(root.attrib.get("tests", 0))
                f = int(root.attrib.get("failures", 0))
                e = int(root.attrib.get("errors", 0))
                s = int(root.attrib.get("skipped", 0))
                total += tests
                failures += f
                errors += e
                skipped += s
            except Exception:
                pass

        failed = failures + errors
        passed = max(total - failed - skipped, 0)

        badges_dir = "target/site/allure-maven-plugin/badges"
        os.makedirs(badges_dir, exist_ok=True)

        def write_badge(filename, label, message, color):
            payload = {
                "schemaVersion": 1,
                "label": label,
                "message": str(message),
                "color": color,
            }
            with open(os.path.join(badges_dir, filename), "w", encoding="utf-8") as f:
                json.dump(payload, f)

        write_badge("passed.json", "tests passed", passed, "brightgreen" if passed > 0 else "lightgrey")
        write_badge("failed.json", "tests failed", failed, "red" if failed > 0 else "brightgreen")
        write_badge("skipped.json", "tests skipped", skipped, "yellow")
        write_badge("total.json", "tests total", total, "blue")
        PY

    - name: Upload Pages Artifact
      if: always()
      uses: actions/upload-pages-artifact@v3
      with:
        path: target/site/allure-maven-plugin

  deploy-allure-pages:
    needs: test
    if: always()
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
